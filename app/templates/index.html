<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stock Price Movement Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <main class="page-container">
        <section class="card">
            <h1>Stock Price Movement Prediction</h1>
            <p class="subtitle">Select a stock ticker, train the model and show the prediction results.</p>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="messages">
                        {% for message in messages %}
                            <p>{{ message }}</p>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <form class="form-container" method="post" action="{{ url_for('train') }}">
                <label for="ticker">Ticker</label>

                <input
                    type="text"
                    id="ticker"
                    name="ticker"
                    list="ticker-list"
                    value="{{ selected_ticker }}"
                    placeholder="Search or select a ticker"
                    required
                >

                <datalist id="ticker-list">
                    {% for ticker in tickers %}
                        <option value="{{ ticker }}"></option>
                    {% endfor %}
                </datalist>

                <div class="buttons-container">
                    <button type="submit" class="button primary-button">
                        Train
                    </button>

                    <button type="button" class="button secondary-button" onclick="showResults()">
                        Show results
                    </button>
                </div>
            </form>
        </section>
    </main>

    <script>
        function showResults() {
            const ticker = document.getElementById("ticker").value;

            if (!ticker) {
                alert("Please select a ticker before showing results.");
                return;
            }

            window.location.href = `/results?ticker=${ticker}`;
        }
    </script>
</body>
</html>
